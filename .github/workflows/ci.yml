name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Least-privilege default for GITHUB_TOKEN; the release-apk job opts up to
# `contents: write` for creating the GitHub Release.
permissions:
  contents: read

# Cancel superseded PR runs; never cancel master or tag builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Compile + unit tests + lint. Runs on every push to master, every PR, and
  # every tag (it gates the APK jobs below via `needs`).
  test:
    name: Test & lint (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        # Slint's core text layout (parley -> fontique) links fontconfig on
        # Linux, so even a host `cargo test`/`clippy` of the GUI crate needs its
        # dev package (the build script shells out to pkg-config for it).
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - name: Tests
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Pull requests (and manual dispatch): build an installable debug APK, signed
  # with AGP's auto-generated, ephemeral debug keystore (nothing to configure).
  debug-apk:
    name: Debug APK (ephemeral signing)
    needs: test
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Free up runner disk space
        run: .github/scripts/free-disk-space.sh
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build builder image (layer-cached)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker
          tags: nairobi-builder:latest
          load: true
          cache-from: type=gha,scope=nairobi-builder
          cache-to: type=gha,mode=max,scope=nairobi-builder
      - name: Build debug APK
        # Image already built above (use docker, where buildx loaded it); tests
        # already ran in the `test` job, so skip the in-container suite.
        run: DOCKER=docker SKIP_IMAGE_BUILD=1 SKIP_TESTS=1 ./build.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nairobi-debug-apk
          # One APK per ABI (the default ABI set is arm64-v8a only).
          path: dist/nairobi-debug-*.apk
          if-no-files-found: error

  # Tags (v*): build a release APK signed with the persistent key from repo
  # secrets and attach it to the GitHub Release. See docs/RELEASING.md.
  release-apk:
    name: Release APK (signed)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release and upload the APK asset
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Free up runner disk space
        run: .github/scripts/free-disk-space.sh
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build builder image (layer-cached)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker
          tags: nairobi-builder:latest
          load: true
          cache-from: type=gha,scope=nairobi-builder
          cache-to: type=gha,mode=max,scope=nairobi-builder
      - name: Decode signing keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::Missing secret RELEASE_KEYSTORE_BASE64 (see docs/RELEASING.md)"
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/nairobi-release.jks"
      - name: Resolve version name from tag
        id: ver
        # refs/tags/v0.2.0 -> 0.2.0
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build signed release APK
        env:
          DOCKER: docker
          # Ship both the 64-bit ARM ABI (real devices) and x86_64 (emulators).
          ABIS: arm64-v8a x86_64
          NAIROBI_KEYSTORE: ${{ runner.temp }}/nairobi-release.jks
          NAIROBI_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          NAIROBI_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          NAIROBI_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          NAIROBI_VERSION_NAME: ${{ steps.ver.outputs.name }}
          NAIROBI_VERSION_CODE: ${{ github.run_number }}
        run: SKIP_IMAGE_BUILD=1 SKIP_TESTS=1 ./build.sh release
      - name: Publish APKs to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # One signed APK per ABI (arm64-v8a for phones, x86_64 for emulators);
          # name each asset after the tag and its ABI.
          assets=()
          for apk in dist/nairobi-release-*.apk; do
            abi="${apk#dist/nairobi-release-}"; abi="${abi%.apk}"
            asset="nairobi-${GITHUB_REF_NAME}-${abi}.apk"
            cp "$apk" "$asset"
            assets+=("$asset")
          done
          # Create the release for this tag (auto notes) and attach the APKs; on
          # a re-run the release exists, so fall back to uploading.
          gh release create "$GITHUB_REF_NAME" \
            --title "nairobi ${GITHUB_REF_NAME}" \
            --generate-notes \
            "${assets[@]}" \
          || gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
